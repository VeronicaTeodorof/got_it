{% extends "base.html" %}

{% load static %}
{% block extra_css %}
  <link rel="stylesheet" href="{% static 'notes/css/notes.css' %}">
{% endblock %}

{% block content %}
  <div class="container-fluid px-0 coral">
    <div class="row g-0">
      <!-- Secondary navigation -->
      <nav class="col-12 col-lg-3 ms-0" aria-label="Content navigation">
        <!-- Back link, mobile only -->
        <div class="back-nav d-lg-none">
          <a href="{% url 'dashboard' %}" class="back-link">
            <!-- Bootstrap Back Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-arrow-left back-icon" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
            </svg>
            Change or add source
          </a>
        </div>
      </nav>
      <!-- Main -->
      <main class="col-12 col-lg-9">
        <h1 class="source-heading">
          <span class="source-name">{{ source.source_name}}</span>
          {% if source.source_author %}
            <span>by {{source.source_author}}</span>
          {% endif %}
          <span class="ms-lg-3 badge"> {{ source.get_source_type_display }}</span>
          <!-- Actions Menu -->
          <span class="dropdown">
            <button class="btn btn-link text-secondary"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              aria-label="Unit actions">
              <!-- Bootstrap Three Dots Vertical Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
                <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
              </svg>
            </button>
            <ul class="dropdown-menu">
              <li>
                <!-- Edit -->
                <button class="dropdown-item btn btn-primary text-secondary align-items-center"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#edit-source-form-{{source.pk}}"
                  aria-expanded="false"
                  aria-controls="#edit-source-form-{{source.pk}}">
                  <!-- Bootstrap Pencil Icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                   <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                  </svg>
                  Edit
                </button>

                <!-- Delete button -->
                <button
                  type="button"
                  class="dropdown-item btn btn-primary text-danger"
                  data-bs-toggle="modal"
                  data-bs-target="#deleteSourceModal-{{source.pk}}"
                >
                  <!-- Bootstrap Trash Icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
                    <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
                  </svg>
                Delete
                </button>
              </li>
            </ul>
          </span>
        </h1>
      </main>
    </div>
  </div>
{% endblock %}
