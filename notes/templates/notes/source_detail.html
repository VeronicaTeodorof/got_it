{% extends "notes/dashboard.html" %}
{% load static %}

{% block dashboard_content %}
    <!-- Edit Modal -->
    <div class="modal fade" id="editSourceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- form goes here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
        <div class="modal fade" id="deleteSourceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Deleting your source will also delete all units and notes associated with it.</p>
                    <p>Are you sure you want to continue?</p>
                </div>
                <div class="modal-footer">
                    <form method="POST" action="{% url 'delete_source' source.pk %}">
                        {% csrf_token %}
                        <button type="button" class="btn btn-sm btn-primary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit"class="btn btn-sm btn-primary">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <h1>{{source}}</h1>

    <!-- CRUD buttons-->
    <!-- Edit button -->
    <!-- Custom 'data-id' attribute added to identify the record to be called -->
    <button
        type="button"
        class="btn btn-sm btn-primary source-edit"
        data-bs-toggle="modal"
        data-bs-target="#editSourceModal"
        data-id="{{ source.id }}"
    >
    Edit
    </button>
    <!-- Delete button -->
    <button
        type="button"
        class="btn btn-sm btn-primary source-delete"
        data-bs-toggle="modal"
        data-bs-target="#deleteSourceModal"
        data-id="{{ source.id }}"
    >
    Delete
    </button>
{% endblock %}
