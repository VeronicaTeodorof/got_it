{% extends "notes/dashboard.html" %}
{% load static %}

{% block dashboard_content %}
    <!-- Edit Modal -->
    <div class="modal fade" id="editSourceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- form goes here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <h1>{{source}}</h1>

    <!-- Edit button -->
    <!-- Custom 'data-id' attribute added to identify the record to be called -->
    <button
        type="button"
        class="btn btn-sm btn-primary source-edit"
        data-bs-toggle="modal"
        data-bs-target="#editSourceModal"
        data-id="{{ source.id }}"
    >
    Edit
    </button>
{% endblock %}
{% block extra_js %}
    <script src="{% static 'notes/js/modals.js' %}"></script>
{% endblock %}
