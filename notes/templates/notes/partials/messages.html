{% if messages %}
  <!-- aria-live announces messages to screen  reader users, best practice for cases wheres
   these appear dynamically without a page reload -->
  <ul class="messages" role="alert" aria-live="polite">
    {% for message in messages %}
      <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
    {% endfor %}
  </ul>
{% endif %}
