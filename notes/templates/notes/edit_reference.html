{% extends 'notes/note_base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block notes %}
 <!-- Edit Reference form -->
    <div class="col-md-8 m-4">
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary m-2">Save</button>
            <a href="{% url 'reference-detail' source.pk unit.pk reference.pk %}" class="btn btn-primary">
                Cancel
            </a>
        </form>
    </div>
{% endblock %}
