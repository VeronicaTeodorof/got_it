{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>got it?</title>

    <!-- Bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Understanding request.user.is_authenticated, given to me by Claude AI:-->
    <!-- request is an instance of the HttpRequest class, an object that Django creates every time a page is requested -->
    <!-- user is a property of the HttpRequest object, set by Django's authentication middleware:
        django.contrib.auth.middleware.AuthenticationMiddleware
        It returns the current User instance if logged in, or an AnonymousUser instance if not -->
    <!-- is_authenticated is a property of the AbstractBaseUser, inherited by the User model, and returns a boolean
    request.user translates into:  the particular user that made that particulat request
    request.user.is_authenticated translates into: is the particular user who made this particular request authenticated? -->

    <!-- Header -->
    <header>
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <!-- Logo on the left -->
                <a  class="navbar-brand me-auto" href="{% url 'home' %}"><img src="{% static 'images/got-it-logo2.svg' %}" alt="got it? logo" height="65"></a>
                <!-- 'd-flex flex-row' added to force horizontal layout -->
                <ul class="navbar-nav d-flex flex-row">
                    <li class="nav-item"><a class="nav-link px-2" href="{% url 'home'%}">Home</a></li>
                    {% if request.user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link px-2" href="{% url 'dashboard' %}">Dashboard</a></li>
                        <li>
                            <form method="POST" action="{% url 'account_logout' %}">
                                {% csrf_token %}
                                <button class="btn btn-link nav-link px-2" type="submit">Log out</button>
                                </form>
                        </li>
                    {% else %}
                        <li class="nav-item px-1"><a class="nav-link" href="{% url 'account_login'%}">Sign In</a></li>
                        <li class="mx-1">
                            <div class="vr h-100 opacity-100"></div>
                        </li>
                        <li class="nav-item px-1"><a class="nav-link" href="{% url 'account_signup' %}">Sign Up</a></li>
                    {% endif %}
                </ul>
            </div>
        </nav>
    </header>

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
     <!--Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
