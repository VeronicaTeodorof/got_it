{% extends "base.html" %}

{% block head_title %}Signin{% endblock head_title %}
{% block content %}
    <h1>Sign In</h1>
    <p>If you have not created an account yet, then please <a href="{{ signup_url }}">sign up</a></p>
    <form method="post" action="{% url 'account_login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        {{ redirect_field }}
        <button type="submit">Sign In</button>
    </form>
{% endblock %}
